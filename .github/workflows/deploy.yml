name: 🚀 Deploy to Freya via rsync

on:
  push:
    branches: [main]

concurrency:
  group: deploy-freya-front
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔐 Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_GITHUB }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 159.89.27.153 >> ~/.ssh/known_hosts

      - name: 🧪 Test SSH
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=no root@159.89.27.153 "echo OK"

      - name: 🔄 Sync files to server
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=no" \
            ./ root@159.89.27.153:/var/www/freya-front

      - name: 🚀 Build & run (pnpm + pm2)
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=no root@159.89.27.153 << 'EOF'
            set -euxo pipefail

            cd /var/www/freya-front

            # Диагностика (в логи)
            which node || true
            which npm || true
            which pnpm || true
            which pm2 || true
            node -v || true
            npm -v || true
            pnpm -v || true
            pm2 -v || true

            # Установка зависимостей строго по lockfile
            pnpm install --frozen-lockfile

            # Сборка
            pnpm run build

            # Перезапуск Nuxt 3 (standalone output)
            pm2 delete exe-front
            pm2 startOrReload ecosystem.config.cjs --update-env
            pm2 save
          EOF

